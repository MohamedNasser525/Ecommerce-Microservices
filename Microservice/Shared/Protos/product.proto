syntax = "proto3";

option csharp_namespace = "ProductGrpc";

package product;

service ProductLookup {
  rpc GetProductById (GetProductByIdRequest) returns (ProductReply);
}

message GetProductByIdRequest {
  string id = 1;
}

message ProductReply {
  string id = 1;
  string name = 2;
  string price = 3;
  int32 quantity = 4;
}
